    <div class="container mt-4">
        <h3>Cadastro de Categoria</h3>
        <form>
            <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" placeholder="Nome da categoria">
            </div>
            <div class="mb-3">
                <label for="informacoes" class="form-label">Informações</label>
                <textarea class="form-control" id="informacoes" rows="3" placeholder="Informações da categoria"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Salvar</button>
        </form>

        <table class="table mt-3 table-bordered table-striped table-hover table-sm">
            <tbody id="lista"></tbody>
        </table>
